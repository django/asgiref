[tox]
envlist =
    py{310,311,312,313,314}-{test,mypy}
    py{313,314}t-test
    qa

[testenv]
usedevelop = true
extras = tests
commands =
    test: pytest -v {posargs}
    mypy: mypy . {posargs}
deps =
    setuptools

# Free-threaded (GIL-disabled) builds. basepython is set explicitly so the env
# resolves to the free-threaded interpreter regardless of tox version.
[testenv:py313t-test]
basepython = python3.13t

[testenv:py314t-test]
basepython = python3.14t

[testenv:qa]
skip_install = true
deps =
    pre-commit
commands =
    pre-commit {posargs:run --all-files --show-diff-on-failure}
